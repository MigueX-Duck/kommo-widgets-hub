<body>
    <div class="cell-wrapper loading">
        <!-- Widget title -->
        <div class="cell-wrapper__caption">Leads Nuevos</div>

        <!-- Main figure in the widget -->
        <div class="cell-wrapper__data">
            <div class="cell-wrapper__data__num" id="leadsCount" title="Cargando...">
                <a href="#" id="leadsLink" target="_blank">-</a>
            </div>
        </div>

        <!-- Widget footer, comparison with the previous period -->
        <div class="cell-wrapper__bottom" id="comparison" title="Comparación con período anterior">
            <span id="comparisonText">Cargando...</span>
        </div>
    </div>

    <script>
        // ========================================
        // Widget con Datos Reales de Kommo
        // ========================================

        const API_BASE_URL = 'https://kommo-widgets-hub.vercel.app/api/kommo';

        // Mapeo de períodos de Kommo a nuestra API
        const PERIOD_MAP = {
            'today': 'day',
            'yesterday': 'day',
            'week': 'week',
            'month': 'month',
            'quarter': 'month', // Usamos month como fallback
            'year': 'month'     // Usamos month como fallback
        };

        // Función para obtener el período actual del dashboard
        function getCurrentPeriod() {
            try {
                // El widget está en un iframe, necesitamos leer la URL del padre
                let periodParam = 'month'; // Default

                try {
                    // Intentar leer la URL del dashboard padre
                    const parentUrl = window.parent.location.href;
                    const urlParams = new URLSearchParams(parentUrl.split('?')[1]);
                    periodParam = urlParams.get('period') || 'month';
                    console.log('Period from parent URL:', periodParam);
                } catch (e) {
                    console.log('Cannot access parent URL (CORS), using default');
                    // Si hay error de CORS, intentar con window.location
                    const urlParams = new URLSearchParams(window.location.search);
                    periodParam = urlParams.get('period') || 'month';
                }

                // Mapear el período de Kommo a nuestra API
                const mappedPeriod = PERIOD_MAP[periodParam] || 'month';
                console.log('Mapped period:', periodParam, '->', mappedPeriod);
                return mappedPeriod;
            } catch (error) {
                console.error('Error getting period:', error);
                return 'month';
            }
        }

        // Variable para guardar el último período usado
        let lastPeriod = null;

        // Función principal para cargar datos
        async function loadLeadsData() {
            try {
                // Obtener el período actual del dashboard
                const period = getCurrentPeriod();

                // Solo recargar si el período cambió
                if (lastPeriod !== null && lastPeriod === period) {
                    console.log('Period unchanged, skipping reload');
                    return;
                }

                lastPeriod = period;
                console.log('Loading data for period:', period);

                // Llamar a la API con el período detectado
                const response = await fetch(`${API_BASE_URL}/leads?period=${period}`);

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();

                if (data.success) {
                    const currentCount = data.data.current.count;
                    const percentChange = data.data.change.percent;

                    // Actualizar UI
                    updateUI(currentCount, percentChange);
                } else {
                    showError('Error al cargar datos');
                }
            } catch (error) {
                console.error('Error loading leads:', error);
                showError('Error de conexión');
            }
        }

        // Función para actualizar la interfaz
        function updateUI(count, percentChange) {
            var wrapper = document.querySelector('.cell-wrapper');
            wrapper.classList.remove('loading');

            // Actualizar número principal
            var leadsCount = document.getElementById('leadsCount');
            var leadsLink = document.getElementById('leadsLink');
            leadsCount.setAttribute('title', count + ' leads nuevos este mes');
            leadsLink.textContent = count;
            leadsLink.href = 'https://funinabox.kommo.com/leads/list/';
            leadsLink.target = '_blank';

            // Actualizar comparación
            var comparison = document.getElementById('comparison');
            var comparisonText = document.getElementById('comparisonText');

            if (percentChange > 0) {
                comparison.className = 'cell-wrapper__bottom green';
                comparisonText.textContent = '+' + percentChange + '%';
            } else if (percentChange < 0) {
                comparison.className = 'cell-wrapper__bottom red';
                comparisonText.textContent = percentChange + '%';
            } else {
                comparison.className = 'cell-wrapper__bottom';
                comparisonText.textContent = '0%';
            }

            comparison.setAttribute('title', 'Comparación con mes anterior: ' + percentChange + '%');
        }

        // Función para mostrar errores
        function showError(message) {
            var wrapper = document.querySelector('.cell-wrapper');
            wrapper.classList.remove('loading');

            var leadsLink = document.getElementById('leadsLink');
            leadsLink.textContent = '--';

            var comparisonText = document.getElementById('comparisonText');
            comparisonText.textContent = message;
        }

        // Cargar datos al iniciar
        loadLeadsData();

        // Revisar cada 2 segundos si cambió el período
        setInterval(loadLeadsData, 2000);
    </script>
